name: blood_bridge
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.8
  loading_animation_widget: ^1.3.0
  get: ^4.7.3
  flutter_svg: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  google_sign_in: ^6.2.1
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.1.2
  firebase_core: ^4.4.0
  intl: ^0.20.2
  permission_handler: ^11.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  dio: ^5.7.0
  geolocator: ^12.0.0
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  image_path_android: assets/images/logo.png
  background_color: "#ffffff"
  background_color_ios: "#ffffff"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/env/